<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Architect — Login</title>
    <meta name="description" content="Login to access Metro Architect - Design beautiful metro maps with ease.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            overflow: hidden;
            position: relative;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        /* Animated gradient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            top: -100px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            bottom: -80px;
            left: -80px;
            animation: float2 10s ease-in-out infinite;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float3 12s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-30px, 40px) scale(1.1); }
            66% { transform: translate(20px, -20px) scale(0.95); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 30px) scale(1.1); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* Metro lines decoration */
        .metro-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .metro-line {
            position: absolute;
            height: 3px;
            border-radius: 2px;
            opacity: 0.15;
        }

        .metro-line:nth-child(1) {
            width: 60%;
            top: 15%;
            left: -10%;
            background: #ef4444;
            animation: slideLine 15s linear infinite;
        }

        .metro-line:nth-child(2) {
            width: 45%;
            top: 35%;
            right: -5%;
            background: #3b82f6;
            animation: slideLine 12s linear infinite reverse;
        }

        .metro-line:nth-child(3) {
            width: 55%;
            top: 65%;
            left: 5%;
            background: #22c55e;
            animation: slideLine 18s linear infinite;
        }

        .metro-line:nth-child(4) {
            width: 40%;
            top: 85%;
            right: 0;
            background: #f59e0b;
            animation: slideLine 14s linear infinite reverse;
        }

        @keyframes slideLine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }

        /* Login card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 24px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 25px 50px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(99, 102, 241, 0.08);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .login-card .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .login-card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #f1f5f9;
            letter-spacing: -0.02em;
        }

        .login-card .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.5;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .input-wrapper input:focus ~ .icon {
            opacity: 1;
        }

        .input-wrapper input::placeholder {
            color: #475569;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.35);
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error message */
        .error-msg {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 0.85rem;
            text-align: center;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        .error-msg.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-4px); }
        }

        /* Success animation */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(99, 102, 241, 0.15);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .success-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .success-icon {
            font-size: 64px;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            color: #475569;
            font-size: 0.75rem;
        }

        .footer-note span {
            color: #6366f1;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 36px 28px;
            }
        }
    </style>
</head>

<body>
    <!-- Background decorations -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="metro-lines">
        <div class="metro-line"></div>
        <div class="metro-line"></div>
        <div class="metro-line"></div>
        <div class="metro-line"></div>
    </div>

    <!-- Login card -->
    <div class="login-card" id="loginCard">
        <div class="logo">
            <div class="logo-icon">🚇</div>
            <h1>Metro Architect</h1>
        </div>
        <p class="subtitle">Sign in to access the Metro Map Builder</p>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="passwordInput">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="Enter your password"
                        autofocus
                        required
                    >
                    <span class="icon">🔒</span>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button type="submit" class="btn-login" id="loginBtn" style="flex: 2;">
                    Sign In (Admin)
                </button>
                <button type="button" class="btn-login" id="guestBtn" style="flex: 1; background: rgba(148, 163, 184, 0.1); border: 1px solid rgba(148, 163, 184, 0.2); color: #94a3b8;">
                    Guest
                </button>
            </div>

            <div class="error-msg" id="errorMsg">
                ⚠️ Incorrect password. Please try again.
            </div>
        </form>

        <div class="footer-note">
            <span>Metro Architect</span> — Design beautiful metro maps
        </div>
    </div>

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✅</div>
    </div>

    <script>
        // If already authenticated, go straight to app
        if (sessionStorage.getItem('metro_auth') === 'true') {
            window.location.replace('app.html');
        }

        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');
        const guestBtn = document.getElementById('guestBtn');
        const successOverlay = document.getElementById('successOverlay');

        const CORRECT_PASSWORD = 'admin123';

        function loginSuccess(role) {
            sessionStorage.setItem('metro_auth', 'true');
            sessionStorage.setItem('metro_role', role);
            successOverlay.classList.add('show');
            setTimeout(function () {
                window.location.href = 'app.html';
            }, 800);
        }

        guestBtn.addEventListener('click', function() {
            loginSuccess('guest');
        });

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const password = passwordInput.value.trim();

            if (password === CORRECT_PASSWORD) {
                loginBtn.disabled = true;
                loginBtn.textContent = 'Signing in...';
                errorMsg.classList.remove('show');
                loginSuccess('admin');
            } else {
                errorMsg.classList.remove('show');
                void errorMsg.offsetWidth;
                errorMsg.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>

</html>
