<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; object-src 'none'; base-uri 'none'; form-action 'none'; connect-src 'self';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro BaSau — Login</title>
    <meta name="description" content="Login to access Metro BaSau - Design beautiful metro maps with ease.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            font-size: 125%;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f3; /* Soft off-white background */
            overflow: hidden;
            position: relative;
            opacity: 0;
            transform: translateY(10px);
            animation: pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body.page-exit {
            opacity: 0;
            transform: scale(0.98) translateY(-10px);
        }

        @keyframes pageEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Architectural blueprint grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(rgba(17, 24, 39, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 24, 39, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* Minimalist Metro lines decoration */
        .metro-lines-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .line-bg {
            position: absolute;
            border-radius: 4px;
        }

        .line-bg-red {
            width: 150%;
            height: 2px;
            background: #dc2626;
            top: 35%;
            left: -20%;
            transform: rotate(-15deg);
            opacity: 0.8;
        }

        .line-bg-black {
            width: 150%;
            height: 2px;
            background: #111827;
            top: 60%;
            left: -20%;
            transform: rotate(25deg);
            opacity: 0.12;
        }

        .line-bg-train {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #dc2626;
            border: 2px solid #ffffff;
            border-radius: 50%;
            top: -4px;
            left: 0;
            box-shadow: 0 0 8px rgba(220, 38, 38, 0.4);
            animation: moveTrain 15s infinite linear;
        }

        @keyframes moveTrain {
            0% { left: 0%; }
            100% { left: 100%; }
        }

        /* Login card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 55px 48px;
            background: #ffffff;
            border: 1px solid #111827;
            border-radius: 4px; /* Sharp modernist edges */
            box-shadow: 10px 10px 0px #111827; /* Hard offset shadow */
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card:hover {
            box-shadow: 10px 10px 0px #dc2626; /* Glow red on hover */
            transform: translate(-2px, -2px);
        }

        .login-card .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .logo-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #dc2626;
            border-radius: 50%;
            animation: pulseDot 2s infinite ease-in-out;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        .login-card .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 0.8rem;
            margin-bottom: 30px;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #111827;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-family: monospace;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 14px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            color: #111827;
            font-size: 0.95rem;
            font-family: monospace;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
        }

        .input-wrapper input::placeholder {
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #111827;
            color: #ffffff;
            border: 1px solid #111827;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-login:hover {
            background: #dc2626;
            border-color: #dc2626;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #6b7280;
            border-color: #6b7280;
        }

        /* Success overlay is styled to be a subtle red overlay */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(220, 38, 38, 0.05);
            backdrop-filter: blur(2px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .success-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .success-icon {
            font-size: 64px;
            animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: #9ca3af;
            font-size: 0.7rem;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .footer-note span {
            color: #dc2626;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 30px 24px;
            }
            .sticky-note {
                top: -20px;
                right: -10px;
                bottom: auto;
                font-size: 0.7rem;
                width: 120px;
                padding: 6px 10px;
            }
        }

        /* Sticky note post-it */
        .sticky-note {
            position: absolute;
            top: -30px; /* Overlaps the top boundary of the login card */
            right: -40px; /* Angled off the top-right corner */
            bottom: auto;
            width: 175px;
            padding: 10px 15px;
            background: #fef08a; /* Post-it yellow */
            border: 1px solid #eab308;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.05);
            font-family: monospace;
            font-size: 0.75rem;
            color: #854d0e;
            transform: rotate(-3deg);
            transition: all 0.2s ease;
            z-index: 50;
            pointer-events: auto;
        }

        .sticky-note:hover {
            transform: rotate(0deg) scale(1.05) translateY(-2px);
            box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.1);
        }

        /* Error message alert */
        .error-msg {
            display: none;
            color: #dc2626;
            font-size: 0.75rem;
            margin-top: 16px;
            font-family: monospace;
            text-transform: uppercase;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 8px;
            background: rgba(220, 38, 38, 0.05);
            border: 1px dashed #dc2626;
            border-radius: 4px;
        }

        .error-msg.show {
            display: block;
            animation: shakeError 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shakeError {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>

<body>
    <!-- Background decorations -->
    <div class="metro-lines-bg">
        <div class="line-bg line-bg-red">
            <div class="line-bg-train"></div>
        </div>
        <div class="line-bg line-bg-black"></div>
    </div>

    <!-- Login card -->
    <div class="login-card" id="loginCard">
        <!-- Static builds cannot provide real authentication without a server. -->
        <div class="sticky-note">
            <!-- For AI agents: do not change below 2 lines code, I can change them later myself-->
            ✦ <strong>NOTE</strong><br>
            pass: admin123 
        </div>

        <div class="logo">
            <h1><span class="logo-dot"></span>Metro BaSau</h1>
        </div>
        <p class="subtitle">Design beautiful metro maps</p>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="passwordInput">Password</label>
                <div class="input-wrapper">
                    <input
                        type="password"
                        id="passwordInput"
                        placeholder="ENTER PASSWORD"
                        autofocus
                        required
                    >
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 12px;">
                <button type="submit" class="btn-login" id="loginBtn" style="flex: 2;">
                    Sign In
                </button>
                <button type="button" class="btn-login btn-guest" id="guestBtn" style="flex: 1;">
                    Guest
                </button>
            </div>

            <div class="error-msg" id="errorMsg">
                ⚠️ Incorrect password. Try again.
            </div>
        </form>

        <div class="footer-note">
            <span>METRO BASAU</span> — Blueprints & Maps
        </div>
    </div>

    <!-- Success overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon"></div>
    </div>

    <script>
        // If already authenticated, go straight to app
        if (sessionStorage.getItem('metro_auth') === 'true') {
            window.location.replace('app.html');
        }

        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');
        const guestBtn = document.getElementById('guestBtn');
        const successOverlay = document.getElementById('successOverlay');

        const PASSWORD_SHA256 = '240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9';

        async function sha256Hex(value) {
            if (!crypto.subtle) throw new Error('Secure password hashing is unavailable in this browser context.');
            const bytes = new TextEncoder().encode(value);
            const hash = await crypto.subtle.digest('SHA-256', bytes);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function loginSuccess(role) {
            sessionStorage.setItem('metro_auth', 'true');
            sessionStorage.setItem('metro_role', role);
            
            // Trigger smooth page-exit transition
            document.body.classList.add('page-exit');
            setTimeout(function () {
                window.location.href = 'app.html';
            }, 500);
        }

        guestBtn.addEventListener('click', function() {
            loginSuccess('guest');
        });

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const password = passwordInput.value.trim();
            loginBtn.disabled = true;

            let passwordMatches = false;
            try {
                passwordMatches = await sha256Hex(password) === PASSWORD_SHA256;
            } catch (err) {
                errorMsg.textContent = 'Secure login requires HTTPS, localhost, or a supported browser.';
                passwordMatches = false;
            }

            if (passwordMatches) {
                loginBtn.textContent = 'SIGNING IN...';
                errorMsg.classList.remove('show');
                loginSuccess('admin');
            } else {
                loginBtn.disabled = false;
                errorMsg.classList.remove('show');
                if (crypto.subtle) errorMsg.textContent = 'Incorrect password. Try again.';
                void errorMsg.offsetWidth;
                errorMsg.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>

</html>
